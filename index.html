  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<body>
    <h1>Welcome to Fashion Hub</h1>
    <p>Premium Cotton Shirts starting at ₹450.</p>
    <button id="buy-button" style="padding: 10px 20px; background: blue; color: white;">Buy Now</button>

                'value': 450

        });
